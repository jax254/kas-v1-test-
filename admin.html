<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Admin Engine</title>
    <style>
        /* Sleek Admin Slate UI Theme */
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 15px;
        }
        .admin-container {
            max-width: 480px;
            margin: 20px auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
            text-align: center;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .session-subtitle {
            text-align: center;
            color: #4ade80;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; }
        
        /* Edit Allowed Status Badges */
        .badge-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .badge-status {
            background: #ef4444; 
            color: white; 
            font-size: 11px; 
            font-weight: bold; 
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        input, select {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569;
            color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        input:focus, select:focus { border-color: #38bdf8; outline: none; }
        
        .btn-blue {
            width: 100%; padding: 12px; background: #38bdf8; color: #0f172a;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px;
            margin-top: 5px; transition: background 0.2s;
        }
        .btn-blue:hover { background: #0ea5e9; }

        .section-divider {
            border: 0;
            border-top: 1px dashed #334155;
            margin: 25px 0;
        }
    </style>
</head>
<body>

<div class="admin-container">

    <div id="gatekeeperView" style="text-align: center; padding: 20px 0;">
        <h2 style="color: #38bdf8; margin-bottom: 5px;">🔐 KAS Gatekeeper</h2>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 20px;">Enter Super Admin Authorization PIN Key</p>
        <input type="password" id="gatekeeperPin" placeholder="••••" style="text-align:center; font-size:24px; letter-spacing:10px; max-width: 200px; margin-bottom: 20px;" maxlength="4">
        <button class="btn-blue" onclick="unlockDashboard()">Verify Credentials</button>
    </div>

    <div id="dashboardView" style="display: none;">
        <div class="header-title">⚡ KAS Admin Engine</div>
        <div class="session-subtitle">Current Session: Super Admin Mode</div>
        
        <div class="form-group">
            <div class="badge-container">
                <label>Daily Package Price (KES)</label>
                <span class="badge-status" style="background: #ef4444;">Edit Allowed</span>
            </div>
            <input type="number" id="dailyInput" value="10">
        </div>

        <div class="form-group">
            <label>Monthly Package Price (KES)</label>
            <input type="number" id="monthlyInput" value="300">
        </div>

        <div class="form-group">
            <label>Global Broadcast Headline Text</label>
            <input type="text" id="bannerInput" value="⚽ FOOTBALL SEASON IS LIVE 🏆">
        </div>

        <button class="btn-blue" onclick="savePanelSettings()">Save & Push Updates Live 🚀</button>

        <div class="section-divider"></div>

        <div class="form-group">
            <div class="badge-container">
                <label style="color: #38bdf8;">🔑 PROVISION NEW ADMIN</label>
                <span class="badge-status" style="background: #ef4444;">Super Admin Only</span>
            </div>
        </div>

        <div class="form-group">
            <label>Admin Name</label>
            <input type="text" id="newAdminName" placeholder="Enter full name">
        </div>

        <div class="form-group">
            <label>Assigned Permission Tier</label>
            <select id="permissionTier">
                <option value="staff">Staff Admin (Read-Only Data)</option>
                <option value="manager">Manager (Edit Allowed)</option>
            </select>
        </div>

        <button class="btn-blue" style="background: #475569; color: white;" onclick="provisionNewAdmin()">Generate Access Key</button>
    </div>
</div>

<script>
    const TARGET_PIN = "2540";

    function unlockDashboard() {
        const pin = document.getElementById("gatekeeperPin").value.trim();
        if (pin === TARGET_PIN) {
            document.getElementById("gatekeeperView").style.display = "none";
            document.getElementById("dashboardView").style.display = "block";
            
            if(localStorage.getItem('dailyPrice')) document.getElementById('dailyInput').value = localStorage.getItem('dailyPrice');
            if(localStorage.getItem('monthlyPrice')) document.getElementById('monthlyInput').value = localStorage.getItem('monthlyPrice');
            if(localStorage.getItem('broadcastMessage')) document.getElementById('bannerInput').value = localStorage.getItem('broadcastMessage');
        } else {
            alert("❌ Access Denied: Invalid Authentication Token PIN.");
        }
    }

    function savePanelSettings() {
        const dPrice = document.getElementById("dailyInput").value;
        const mPrice = document.getElementById("monthlyInput").value;
        const bText = document.getElementById("bannerInput").value;

        localStorage.setItem('dailyPrice', dPrice);
        localStorage.setItem('monthlyPrice', mPrice);
        localStorage.setItem('broadcastMessage', bText);

        alert("✨ Settings saved successfully and broadcasted live to the main page!");
    }

    function provisionNewAdmin() {
        const name = document.getElementById("newAdminName").value.trim();
        const tier = document.getElementById("permissionTier").value;
        
        if(!name) {
            alert("Please enter the administrator's name.");
            return;
        }
        
        // Simulates credential generation mapping
        alert(`Access key created successfully for ${name} as a ${tier === 'staff' ? 'Staff Admin' : 'Manager'}!`);
        document.getElementById("newAdminName").value = "";
    }
</script>

</body>
</html>
