<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS | Super Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #0f172a, #020617); min-height: 100vh; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="admin-login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <h2 class="text-2xl font-black mb-6">Admin Access</h2>
            <input id="admin-pin" type="password" maxlength="6" placeholder="••••••" class="w-full text-center text-3xl font-bold py-4 mb-6 bg-black/20 border border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500">
            <button onclick="attemptLogin()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-2xl transition">Verify Identity</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden min-h-screen p-8 max-w-7xl mx-auto">
        <h1 class="text-3xl font-black mb-8">System Overview</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl">
                <div class="text-slate-400 text-xs font-bold uppercase">Revenue</div>
                <div id="stat-revenue" class="text-3xl font-black text-cyan-400">KES 0.00</div>
            </div>
            <div class="glass p-6 rounded-2xl">
                <div class="text-slate-400 text-xs font-bold uppercase">Pending Actions</div>
                <div id="stat-pending" class="text-3xl font-black text-amber-400">0</div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl mb-8">
            <h3 class="text-lg font-bold mb-6">Revenue Growth Trends</h3>
            <canvas id="performanceChart" height="80"></canvas>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h3 class="text-lg font-bold mb-6">Pending Content Approvals</h3>
            <div id="approval-queue" class="space-y-4">
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                    <div>
                        <p class="font-bold">New Course: Forex Strategies 101</p>
                        <p class="text-xs text-slate-400">Submitted by: Sub-Admin Jane</p>
                    </div>
                    <button onclick="approveItem('course-101')" class="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-500">APPROVE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function attemptLogin() {
            document.getElementById('admin-login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').classList.remove('hidden');
            initChart();
        }

        async function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Revenue',
                        data: [1200, 1900, 3000, 5000, 4000, 7000, 9500],
                        borderColor: '#0ea5e9',
                        backgroundColor: 'rgba(14, 165, 233, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        function approveItem(id) {
            alert("Approving item: " + id);
            // Add your fetch logic here to notify your backend
        }
    </script>
</body>
</html>
