<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS | Super Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at center, #0f172a, #020617);
            background-size: cover;
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- LOGIN SCREEN -->
    <div id="admin-login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div class="w-16 h-16 bg-amber-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-amber-400 text-2xl">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-2xl font-black mb-1 text-white">Admin Access</h2>
            <input id="admin-pin-input" type="password" maxlength="6" placeholder="••••••" 
                class="w-full text-center text-3xl font-bold py-4 my-6 bg-black/20 border border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500">
            <button onclick="attemptAdminLogin()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-2xl transition">Verify Identity</button>
        </div>
    </div>

    <!-- DASHBOARD (Hidden until login) -->
    <div id="admin-dashboard-layout" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-64 glass p-6 flex flex-col">
            <div class="mb-10 text-xl font-black text-cyan-400">KAS CONTROL</div>
            <nav class="space-y-4 flex-1">
                <button onclick="switchTab('overview')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 transition"><i class="fa-solid fa-chart-line mr-2"></i> Overview</button>
                <button onclick="switchTab('admins')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 transition"><i class="fa-solid fa-users-gear mr-2"></i> Manage Admins</button>
            </nav>
            <button onclick="location.reload()" class="text-rose-400 text-sm"><i class="fa-solid fa-right-from-bracket"></i> Exit Session</button>
        </aside>

        <main class="flex-1 p-10">
            <h1 class="text-3xl font-black mb-8">System Overview</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-2xl">
                    <div class="text-slate-400 text-xs font-bold uppercase">Revenue</div>
                    <div class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-amber-300">KES 0.00</div>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <div class="text-slate-400 text-xs font-bold uppercase">Active Students</div>
                    <div class="text-3xl font-black">0</div>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <div class="text-slate-400 text-xs font-bold uppercase">System Status</div>
                    <div class="text-xl font-bold text-emerald-400"><i class="fa-solid fa-circle animate-pulse"></i> Operational</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function attemptAdminLogin() {
            // Add your password validation logic here
            document.getElementById('admin-login-screen').style.display = 'none';
            document.getElementById('admin-dashboard-layout').classList.remove('hidden');
        }
        function switchTab(tab) {
            console.log("Switching to: " + tab);
        }
    </script>
</body>
</html>
