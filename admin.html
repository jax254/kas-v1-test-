<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAS | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-8">
    
    <div id="admin-content" class="hidden">
        <h1 class="text-3xl font-black text-cyan-400 mb-8">ADMIN SANCTUM</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-6 rounded-3xl">
                <h2 class="font-bold mb-4">Live Suggestions</h2>
                <div id="suggestion-feed" class="text-slate-400 text-sm"></div>
            </div>
            <div class="glass p-6 rounded-3xl">
                <h2 class="font-bold mb-4">Staff Activity</h2>
                <div id="audit-log" class="text-slate-400 text-sm"></div>
            </div>
        </div>
    </div>

    <div id="loader" class="text-center mt-20 text-cyan-400">Authenticating KAS Admin...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { firebaseConfig } from './auth-config.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // THE GATEKEEPER: Only allows access if the email matches yours
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "jax16979@gmail.com") {
                document.getElementById('admin-content').classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
            } else {
                window.location.href = "index.html"; // Unauthorized access sends them home
            }
        });
    </script>
</body>
</html>
