<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Admin Engine - Secure Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .admin-box {
            max-width: 550px;
            margin: auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        h2 { color: #38bdf8; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569;
            color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        input:focus, textarea:focus, select:focus { border-color: #38bdf8; outline: none; }
        .btn-admin {
            width: 100%; padding: 12px; background: #38bdf8; color: #0f172a;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px;
        }
        .btn-admin:hover { background: #0ea5e9; }
        .badge {
            background: #ef4444; color: white; font-size: 11px; padding: 3px 8px;
            border-radius: 4px; float: right; font-weight: bold;
        }
        .gatekeeper-panel { text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div class="admin-box">
    <div id="gatekeeperMode" class="gatekeeper-panel">
        <span class="badge" style="float:none; display:inline-block; margin-bottom:10px;">Super Admin Only</span>
        <h2>🔐 KAS Gatekeeper</h2>
        <p style="color: #94a3b8; font-size: 14px;">Enter Super Admin Authorization PIN Key</p>
        <div class="form-group">
            <input type="password" id="adminPin" placeholder="••••" style="text-align:center; font-size:22px; letter-spacing:8px;" maxlength="4">
        </div>
        <button class="btn-admin" onclick="verifyAdminPin()">Verify Credentials</button>
    </div>

    <div id="controlPanelMode" style="display: none;">
        <h2>⚡ KAS Admin Engine</h2>
        <p style="text-align:center; color:#94a3b8;">Current Session: <strong style="color:#4ade80;">Super Admin Mode</strong></p>
        
        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

        <div class="form-group">
            <span class="badge">Edit Allowed</span>
            <label>Daily Package Price (KES)</label>
            <input type="number" id="inputDailyPrice" value="10">
        </div>

        <div class="form-group">
            <label>Monthly Package Price (KES)</label>
            <input type="number" id="inputMonthlyPrice" value="300">
        </div>

        <div class="form-group">
            <label>Global Broadcast Headline Text</label>
            <textarea id="inputBroadcast" rows="2" placeholder="⚽ FOOTBALL SEASON IS LIVE 🏆"></textarea>
        </div>

        <button class="btn-admin" onclick="pushGlobalUpdates()">Save & Push Updates Live 🚀</button>
        
        <p id="statusFeedback" style="text-align:center; color:#4ade80; font-weight:bold; margin-top:15px; display:none;">✨ Settings synced to main database!</p>
    </div>
</div>

<script>
// Default high-security authorization PIN key
const SECRET_ADMIN_PIN = "2026"; 

function verifyAdminPin() {
    const enteredPin = document.getElementById("adminPin").value.trim();
    if (enteredPin === SECRET_ADMIN_PIN) {
        document.getElementById("gatekeeperMode").style.display = "none";
        document.getElementById("controlPanelMode").style.display = "block";
        
        // Load any current configurations out of local storage container arrays
        if(localStorage.getItem('dailyPrice')) document.getElementById('inputDailyPrice').value = localStorage.getItem('dailyPrice');
        if(localStorage.getItem('monthlyPrice')) document.getElementById('inputMonthlyPrice').value = localStorage.getItem('monthlyPrice');
        if(localStorage.getItem('broadcastMessage')) document.getElementById('inputBroadcast').value = localStorage.getItem('broadcastMessage');
    } else {
        alert("❌ Access Denied: Invalid Authentication Token PIN.");
    }
}

function pushGlobalUpdates() {
    const daily = document.getElementById("inputDailyPrice").value;
    const monthly = document.getElementById("inputMonthlyPrice").value;
    const broadcast = document.getElementById("inputBroadcast").value.trim();

    // Broadcast variables over cross-window browser storage bus blocks
    localStorage.setItem('dailyPrice', daily);
    localStorage.setItem('monthlyPrice', monthly);
    if(broadcast) {
        localStorage.setItem('broadcastMessage', broadcast);
    }

    // Toggle live confirmation notification text overlay
    const feedback = document.getElementById("statusFeedback");
    feedback.style.display = "block";
    setTimeout(() => { feedback.style.display = "none"; }, 3000);
}
</script>

</body>
</html>
