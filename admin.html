<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS - Control Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        h2 { color: #38bdf8; text-align: center; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge.super { background: #ef4444; color: white; }
        .badge.staff { background: #f59e0b; color: white; }

        .card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .card h3 { margin-top: 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .disabled-zone { opacity: 0.5; cursor: not-allowed; position: relative; }
        .disabled-zone::after { content: "🔒 Super Admin Only"; position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; }
        button:hover { background: #0ea5e9; }
        
        .admin-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ KAS Admin Engine</h2>
    
    <!-- Active Session Identity Indicator -->
    <div class="card">
        <p style="margin: 0; font-size: 14px;">Current Session: <strong>Jesse Kasamba</strong> <span class="badge super">Super Admin</span></p>
    </div>

    <!-- Live Client Tracker (Accessible by ALL Admins) -->
    <div class="card">
        <h3>📋 Recent Payhero M-Pesa Logs</h3>
        <div class="admin-row">
            <span>0717688*** (Daily Sprint)</span>
            <span style="color: #4ade80;">Active</span>
        </div>
        <div class="admin-row">
            <span>0722000*** (Monthly Premium)</span>
            <span style="color: #4ade80;">Active</span>
        </div>
    </div>

    <!-- App Configurations (Protected for Limited Power Admins) -->
    <div class="card disabled-zone">
        <h3>⚙️ Global Price Controls</h3>
        <label>Daily Price (KES)</label>
        <input type="number" value="10" disabled>
        <label>Monthly Price (KES)</label>
        <input type="number" value="300" disabled>
    </div>

    <div class="card disabled-zone">
        <h3>🎨 Banner & Season Management</h3>
        <label>Banner Header Text</label>
        <input type="text" value="⚽ FOOTBALL SEASON IS LIVE 🏆" disabled>
        <button disabled>Push Updates to Website</button>
    </div>

    <!-- Admin Provisioning Panel (Protected) -->
    <div class="card disabled-zone">
        <h3>🔑 Provision New Admins</h3>
        <label>Admin Name</label>
        <input type="text" placeholder="Enter full name" disabled>
        <label>Assigned Permission Tier</label>
        <select disabled>
            <option>Staff Admin (Read-Only Data)</option>
        </select>
        <button disabled>Generate Access Key</button>
    </div>
</div>

</body>
</html>
