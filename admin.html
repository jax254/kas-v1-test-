<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS - Secure Control Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; display: none; }
        
        #auth-screen { max-width: 400px; margin: 100px auto; text-align: center; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        h2 { color: #38bdf8; text-align: center; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 5px; }
        .badge.super { background: #4ade80; color: #0f172a; }
        .badge.staff { background: #f59e0b; color: white; }

        .card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 8px; margin-bottom: 20px; position: relative; }
        .card h3 { margin-top: 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; }

        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; font-size: 14px; }
        button { background: #38bdf8; color: #0f172a; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; }
        button:hover { background: #0ea5e9; }
        .admin-row { padding: 8px 0; border-bottom: 1px solid #334155; font-size: 14px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>🔒 KAS Gatekeeper</h2>
    <p style="color: #94a3b8; font-size: 14px;">Enter Authorized Admin Access PIN</p>
    <input type="password" id="adminPin" placeholder="••••" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 5px;">
    <button onclick="verifyPasscode()">Verify Credentials</button>
</div>

<div class="container" id="dashboard">
    <h2>⚡ KAS Multi-Admin Engine</h2>
    
    <div class="card">
        <p style="margin: 0; font-size: 14px;">Session Holder: <span id="currentSessionName" style="font-weight:bold;"></span> <span id="currentSessionBadge" class="badge"></span></p>
    </div>

    <div class="card" id="provisioningBlock">
        <h3>🔑 Active Management Team & Provisioning</h3>
        <div id="adminList">
            <div class="admin-row"><span>Jesse Kasamba (Master)</span><span style="color:#4ade80;">Super Admin</span></div>
            <div class="admin-row"><span>Assistant Officer</span><span style="color:#f59e0b;">Staff Admin</span></div>
        </div>
        <input type="text" id="newAdminName" placeholder="Enter new assistant name" style="margin-top:15px;">
        <select id="newAdminPin">
            <option value="1122">Assign Entry PIN: 1122 (Staff Tier)</option>
            <option value="3344">Assign Entry PIN: 3344 (Staff Tier)</option>
        </select>
        <button onclick="addNewAdmin()">Provision Access Key</button>
    </div>

    <div class="card" id="pricingBlock">
        <h3>⚙️ Global Price Matrix Configuration</h3>
        <label style="font-size: 12px; color: #94a3b8;">Daily Price (KES)</label>
        <input type="number" id="dailyPriceInput" value="10">
        <label style="font-size: 12px; color: #94a3b8; margin-top:10px; display:block;">Monthly Price (KES)</label>
        <input type="number" id="monthlyPriceInput" value="300">
        <button onclick="savePrices()">BroadCast New Pricing Rules</button>
    </div>

    <div class="card" id="bannerBlock">
        <h3>📢 Push Global Client Announcement</h3>
        <label style="font-size: 12px; color: #94a3b8;">Alert Marquee Text</label>
        <input type="text" id="bannerTextInput" value="⚽ FOOTBALL SEASON IS LIVE 🏆">
        <button onclick="updateBanner()">Broadcast Live Push Notice</button>
    </div>
</div>

<script>
// Database definitions of your administrative registry
const ADMIN_REGISTRY = {
    "2540": { name: "Jesse Kasamba", tier: "super" },
    "1122": { name: "Assistant Staff", tier: "staff" }
};

let activeUser = null;

function verifyPasscode() {
    const pin = document.getElementById('adminPin').value;
    if (ADMIN_REGISTRY[pin]) {
        activeUser = ADMIN_REGISTRY[pin];
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        document.getElementById('currentSessionName').innerText = activeUser.name;
        const badge = document.getElementById('currentSessionBadge');
        
        if(activeUser.tier === 'super') {
            badge.innerText = "Super Admin";
            badge.className = "badge super";
        } else {
            badge.innerText = "Staff Admin";
            badge.className = "badge staff";
            // Security Lock: Staff admins cannot edit main architecture structures
            document.getElementById('pricingBlock').style.opacity = "0.4";
            document.getElementById('bannerBlock').style.opacity = "0.4";
            document.getElementById('provisioningBlock').style.opacity = "0.4";
        }
    } else {
        alert("Access Denied: Invalid Authorization PIN Token.");
    }
}

function savePrices() {
    if(activeUser.tier !== 'super') { alert("Security Block: Staff accounts cannot alter pricing tariffs."); return; }
    const daily = document.getElementById('dailyPriceInput').value;
    const monthly = document.getElementById('monthlyPriceInput').value;
    localStorage.setItem('dailyPrice', daily);
    localStorage.setItem('monthlyPrice', monthly);
    alert("Pricing structure safely encrypted and synced to client panels!");
}

function updateBanner() {
    if(activeUser.tier !== 'super') { alert("Security Block: Staff accounts cannot change front announcements."); return; }
    const txt = document.getElementById('bannerTextInput').value;
    localStorage.setItem('broadcastMessage', txt);
    alert(`Success: Notice sent live to all students!`);
}

function addNewAdmin() {
    if(activeUser.tier !== 'super') { alert("Security Error: Only the Master owner can provision new accounts."); return; }
    const name = document.getElementById('newAdminName').value.trim();
    const assignedPin = document.getElementById('newAdminPin').value;
    if(!name) return alert("Please supply assistant name.");
    
    ADMIN_REGISTRY[assignedPin] = { name: name, tier: "staff" };
    document.getElementById('adminList').innerHTML += `<div class="admin-row"><span>${name}</span><span style="color:#f59e0b;">Staff Admin</span></div>`;
    alert(`Account provisioned successfully for ${name}! They can log in with PIN ${assignedPin}.`);
}
</script>
</body>
</html>
