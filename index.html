<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS | Knowledge And Skills</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: radial-gradient(circle at top right, #0ea5e922, transparent), radial-gradient(circle at bottom left, #f59e0b22, transparent); }
        .prudence-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="hero-gradient font-sans">

    <nav class="glass flex justify-between items-center px-8 py-6 border-b border-white/5">
        <div class="text-2xl font-black text-cyan-400">KAS<span class="text-white">HUB</span></div>
        <div class="flex gap-4">
            <button onclick="toggleModal('pay-modal')" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl hover:bg-white/10 transition">PREMIUM</button>
            <button onclick="location.href='admin.html'" class="text-xs font-bold bg-cyan-600 px-4 py-2 rounded-xl hover:bg-cyan-500 transition shadow-[0_0_15px_rgba(8,145,178,0.4)]">ADMIN</button>
        </div>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight">Master Any Skill.</h1>
        <p class="text-slate-400 max-w-lg mx-auto mb-10">Localized structural tracks powered by AI, designed for the modern learner.</p>
        <div class="glass max-w-md mx-auto p-2 rounded-2xl flex border border-white/10">
            <input type="text" placeholder="Search modules..." class="bg-transparent flex-1 px-4 py-2 focus:outline-none text-sm">
            <button class="bg-cyan-600 px-6 py-2 rounded-xl font-bold text-sm">SEARCH</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="glass p-6 rounded-3xl hover:bg-white/5 transition border-t-2 border-transparent hover:border-cyan-500">
                <i class="fa-solid fa-graduation-cap text-2xl text-cyan-400 mb-4"></i>
                <h3 class="font-bold mb-2">High School & CBC</h3>
                <p class="text-xs text-slate-400 mb-4">Competency trackers & exam modules.</p>
                <button onclick="checkAccess()" class="w-full py-2 bg-white/5 rounded-xl text-xs font-bold">LAUNCH</button>
            </div>
            </div>
    </main>

    <div class="fixed bottom-8 right-8 prudence-float">
        <button onclick="talkPrudence()" class="w-16 h-16 rounded-full bg-gradient-to-tr from-cyan-600 to-amber-500 shadow-[0_0_25px_rgba(14,165,233,0.5)] flex items-center justify-center text-2xl">
            🎓
        </button>
    </div>

    <script>
        function talkPrudence() { alert("Prudence is ready to guide you!"); }
        
        function checkAccess() {
            const trialStart = localStorage.getItem('trialStart');
            if (!trialStart) {
                localStorage.setItem('trialStart', new Date().toISOString());
                alert("Trial started! You have 3 days of access.");
            }
            // Add your logic to check if 3 days have passed vs Date.now()
            console.log("Access checked.");
        }
    </script>
</body>
</html>
