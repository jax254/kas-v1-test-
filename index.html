<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarly Network Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0f19;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ⚡ MOVING CLIPPERS TICKER */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background-color: rgba(6, 12, 24, 0.95);
            border-bottom: 2px solid #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            padding: 12px 0;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        .ticker:hover {
            animation-play-state: paused;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 2rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ticker-item::after {
            content: " •";
            color: #00ffff;
            padding-left: 2rem;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* SECURITY ENGINE CONSOLE HEADER */
        .security-header {
            border: 1px solid #00ff66;
            background-color: rgba(0, 255, 102, 0.05);
            color: #00ff66;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: fit-content;
            margin: 20px auto 0 auto;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* MAIN TERMINAL CARD Container */
        .terminal-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .terminal-card {
            background: rgba(13, 22, 38, 0.85);
            border: 2px solid #8a2be2; /* Deep Neon Purple */
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 30px 25px;
            text-align: center;
        }

        .terminal-title {
            color: #00ffff;
            font-size: 1.6rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        /* TAB NAVIGATION */
        .tab-control {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888888;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            padding-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            width: 50%;
        }

        .tab-btn.active {
            color: #00ffff;
            border-bottom: 3px solid #00ffff;
        }

        /* FORM CONTROLS */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #8fa0bc;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            background: #162235;
            border: 1px solid #2c3e5d;
            border-radius: 6px;
            padding: 12px 15px;
            color: #ffffff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        /* SUBMIT UTILITY BUTTON */
        .action-btn {
            width: 100%;
            background: #00aeef;
            color: #000000;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .action-btn:hover {
            background: #00ffff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .action-btn:active {
            transform: translateY(1px);
        }

        /* RESPONSE/FEEDBACK MODULE */
        #feedback-log {
            margin-top: 15px;
            font-size: 0.85rem;
            min-height: 20px;
        }
        .success-msg { color: #00ff66; }
        .error-msg { color: #ff3333; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker">
            <span class="ticker-item">⚡ COHORTS RECRUITMENT LIVE (2026/2027)</span>
            <span class="ticker-item">🌐 GLOBAL BUSINESS MODULE ONLINE</span>
            <span class="ticker-item">🔒 SECURE LAYER ACCESS AUTHENTICATED</span>
        </div>
    </div>

    <div class="security-header">⚡ SECURITY ENGINE CONSOLE ACTIVE</div>

    <div class="terminal-container">
        <div class="terminal-card">
            <h2 class="terminal-title">Scholarly Network Terminal</h2>
            
            <div class="tab-control">
                <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
            </div>

            <form id="terminal-form" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label id="email-label">Institutional Email Node</label>
                    <input type="email" id="email" class="form-control" placeholder="user@domain.com" required>
                </div>
                
                <div class="form-group">
                    <label>Secret Password Passkey</label>
                    <input type="password" id="password" class="form-control" placeholder="••••" required>
                </div>

                <button type="submit" class="action-btn" id="submit-btn">Boot Platform Node</button>
            </form>

            <div id="feedback-log"></div>
        </div>
    </div>

    <script>
        let currentMode = 'signin';

        function switchTab(mode) {
            currentMode = mode;
            const tabSignIn = document.getElementById('tab-signin');
            const tabSignUp = document.getElementById('tab-signup');
            const emailLabel = document.getElementById('email-label');
            const submitBtn = document.getElementById('submit-btn');
            const feedback = document.getElementById('feedback-log');
            
            feedback.innerHTML = ''; // clear messages

            if (mode === 'signin') {
                tabSignIn.classList.add('active');
                tabSignUp.classList.remove('active');
                emailLabel.innerText = "Institutional Email Node";
                submitBtn.innerText = "Boot Platform Node";
            } else {
                tabSignUp.classList.add('active');
                tabSignIn.classList.remove('active');
                emailLabel.innerText = "Register Email Node";
                submitBtn.innerText = "Provision System Profile";
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const feedback = document.getElementById('feedback-log');
            const submitBtn = document.getElementById('submit-btn');

            feedback.innerHTML = `<span style="color: #ffcc00;">Sending payload to core server...</span>`;
            submitBtn.disabled = true;

            // Route dynamically mirrors chosen tab choice
            const targetEndpoint = currentMode === 'signin' ? '/api/signin' : '/api/signup';

            try {
                const response = await fetch(targetEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    feedback.innerHTML = `<span class="success-msg">✔ ${data.message}</span>`;
                    if(currentMode === 'signin') {
                        // Optional redirect or dashboard unlock can go here
                        setTimeout(() => alert('Access Granted! Entering Core Layer...'), 800);
                    } else {
                        switchTab('signin');
                    }
                } else {
                    feedback.innerHTML = `<span class="error-msg">❌ Error: ${data.message}</span>`;
                }
            } catch (err) {
                feedback.innerHTML = `<span class="error-msg">❌ Terminal communication failure. Server down.</span>`;
            } finally {
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
