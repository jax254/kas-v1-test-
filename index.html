<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS - Knowledge & Skills</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; padding-bottom: 100px; }
        .box { max-width: 500px; margin: auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; margin-top: 15px; }
        p { text-align: center; font-size: 14px; color: #94a3b8; }
        
        /* Auth Gateway Styles */
        .auth-container { max-width: 400px; margin: 60px auto; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .auth-toggle { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .auth-toggle span { cursor: pointer; color: #94a3b8; font-weight: bold; padding: 5px 10px; }
        .auth-toggle span.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }

        /* Doodle Live Header Panel */
        .seasonal-doodle-banner { background: linear-gradient(135deg, #020617, #1e3a8a); color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid #1d4ed8; min-height: 100px; }
        .doodle-content { position: relative; z-index: 2; }
        .seasonal-doodle-banner h3 { margin: 0 0 8px 0; font-size: 18px; color: #38bdf8; }
        .seasonal-doodle-banner p { margin: 0; color: #e6f2ff; font-weight: bold; font-size: 13px; }
        .pitch-field { position: absolute; bottom: 0; left: 0; width: 100%; height: 35px; background: rgba(16, 185, 129, 0.15); border-top: 1px dashed rgba(255,255,255,0.2); z-index: 1; }
        .live-football { position: absolute; bottom: 8px; left: 10%; font-size: 18px; z-index: 3; animation: bounceAndRoll 5s linear infinite; }
        .player-avatar { position: absolute; bottom: 5px; left: 5%; font-size: 24px; z-index: 3; animation: playerMove 5s ease-in-out infinite; }

        @keyframes bounceAndRoll {
            0% { left: 12%; transform: rotate(0deg); }
            50% { left: 82%; transform: rotate(360deg); }
            100% { left: 12%; transform: rotate(720deg); }
        }
        @keyframes playerMove {
            0% { left: 4%; transform: scaleX(1); }
            50% { left: 15%; transform: scaleX(-1); }
            100% { left: 4%; transform: scaleX(1); }
        }

        /* Form Assemblies */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border: 1px solid #475569; background: #0f172a; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus { border-color: #38bdf8; outline: none; }
        
        .btn-action { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-action:hover { background: #0ea5e9; }
        .payment-section { background: #111827; padding: 20px; border-radius: 8px; border: 1px solid #334155; margin-top: 20px; }
        .logout-link { display: block; text-align: center; color: #ef4444; margin-top: 15px; font-size: 13px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="authPanel" class="auth-container">
    <h2>🔐 Student Access Terminal</h2>
    <div class="auth-toggle">
        <span id="tabLogin" class="active" onclick="switchAuthMode('login')">Sign In</span>
        <span id="tabRegister" onclick="switchAuthMode('register')">Create Account</span>
    </div>
    
    <div class="form-group">
        <label>Institutional Email</label>
        <input type="email" id="authEmail" placeholder="student@example.com">
    </div>
    <div class="form-group">
        <label>Password Account Key</label>
        <input type="password" id="authPassword" placeholder="••••••••">
    </div>
    <button class="btn-action" id="authBtn" onclick="handleAuthAction()">Access Platform Core</button>
</div>

<div class="box" id="mainPortal" style="display: none;">
    <div class="seasonal-doodle-banner">
        <div class="doodle-content">
            <h3>⚽ FOOTBALL SEASON IS LIVE 🏆</h3>
            <p>Complete Access Authentication to Extract Academic High-Yield Syllabi.</p>
        </div>
        <div class="player-avatar">🏃‍♂️</div>
        <div class="live-football">⚽</div>
        <div class="pitch-field"></div>
    </div>

    <h2>🎓 KAS - Knowledge & Skills</h2>
    <p>Logged in securely as: <span id="loggedUser" style="color:#38bdf8; font-weight:bold;"></span></p>

    <div class="payment-section">
        <h3 style="margin-top:0; color:#38bdf8; text-align:center; font-size:16px;">💳 Premium Node Activation</h3>
        
        <div class="form-group">
            <label>M-Pesa Mobile Identity (Safely Handled)</label>
            <input type="number" id="mpesaPhone" placeholder="07XXXXXXXX">
        </div>

        <div class="form-group">
            <label>Select Access Interval Strategy</label>
            <select id="premiumPackage" onchange="synchronizeSystemPrice()">
                <option value="300">Monthly Pass — KES 300</option>
                <option value="10">Daily Basic Sprint — KES 10</option>
            </select>
        </div>

        <div class="form-group">
            <label>Enforced Ledger Tariff Amount (KES)</label>
            <input type="number" id="paymentAmount" value="300" disabled style="background: #0f172a; font-weight: bold; color: #4ade80;">
        </div>

        <button class="btn-action" onclick="executeSecureRedirection()">Initialize Secured Payment Channel 🚀</button>
    </div>
    
    <a href="#" class="logout-link" onclick="triggerSessionExit()">Sign Out of Student Profile</a>
</div>

<script>
let currentAuthMode = 'login';

function switchAuthMode(mode) {
    currentAuthMode = mode;
    document.getElementById('tabLogin').className = mode === 'login' ? 'active' : '';
    document.getElementById('tabRegister').className = mode === 'register' ? 'active' : '';
    document.getElementById('authBtn').innerText = mode === 'login' ? 'Access Platform Core' : 'Register Secure Profile';
}

function handleAuthAction() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;

    if (!email || !password) {
        alert("Please completely define validation credentials.");
        return;
    }

    if (currentAuthMode === 'register') {
        localStorage.setItem(`user_${email}`, password);
        alert("Secure profile initialized successfully! Log in now.");
        switchAuthMode('login');
        return;
    }

    const savedPass = localStorage.getItem(`user_${email}`);
    if (savedPass && savedPass === password) {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPortal').style.display = 'block';
        document.getElementById('loggedUser').innerText = email;
    } else {
        alert("Invalid validation credentials. Please retry or create a new profile.");
    }
}

function synchronizeSystemPrice() {
    const selector = document.getElementById("premiumPackage");
    document.getElementById("paymentAmount").value = selector.value;
}

function executeSecureRedirection() {
    const phone = document.getElementById("mpesaPhone").value.trim();
    const amount = document.getElementById("paymentAmount").value;
    const userEmail = document.getElementById('loggedUser').innerText;

    if (!phone) {
        alert("Please insert an active phone payload.");
        return;
    }

    // Clean reference payload generated dynamically out of user metrics
    const dynamicReference = encodeURIComponent(userEmail.split('@')[0] + amount);
    
    // Constructing the direct link containing phone, price, and auto-generated reference
    const payheroEndpoint = `https://lipwa.link/10354?amount=${amount}&phone=${phone}&reference=${dynamicReference}`;
    
    alert(`Redirecting to payment gateway securely...`);
    window.location.href = payheroEndpoint;
}

function triggerSessionExit() {
    document.getElementById('mainPortal').style.display = 'none';
    document.getElementById('authPanel').style.display = 'block';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
}
</script>

</body>
</html>
